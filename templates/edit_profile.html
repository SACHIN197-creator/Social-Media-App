{% extends 'base.html' %}

{% block content %}

<div class="edit-container">

    <div class="card">

        <h2>

            Edit Profile

        </h2>

        <form method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            <label>

                Bio

            </label>

            {{form.bio}}

            <br><br>

            <label>

                Profile Image

            </label>

            {{form.image}}

            <br><br>

            <button type="submit">

                Save Changes

            </button>

        </form>

    </div>

</div>

{% endblock %}
