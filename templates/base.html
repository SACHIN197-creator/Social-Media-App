<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SocialHub</title>

    {% load static %}

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">
            Social Media App
        </div>

        <div class="search-box">

            <form action="/search/">

                <input type="text"
                       name="q"
                       placeholder="Search users...">

            </form>

        </div>

        <div class="nav-links">

            <a href="/home/">
                Home
            </a>

            <a href="/profile/{{request.user.id}}/">
                Profile
            </a>

            <a href="/logout/">
                Logout
            </a>

            <button id="themeBtn">
                🌙
            </button>

        </div>

    </nav>

    <div class="container">

        {% block content %}

        {% endblock %}

    </div>

    <button id="topBtn">
        ↑
    </button>

    <script src="{% static 'js/script.js' %}"></script>

</body>

</html>
