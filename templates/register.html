<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    {% load static %}

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>
            Register
        </h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">

                Register

            </button>

        </form>

        <p>

            Already have account?

            <a href="/">

                Login

            </a>

        </p>

    </div>

</div>

</body>

</html>
