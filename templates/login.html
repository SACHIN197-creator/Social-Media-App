<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    {% load static %}

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>
            Login
        </h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

        <p>

            Don't have account?

            <a href="/register/">

                Register

            </a>

        </p>

    </div>

</div>

</body>

</html>
